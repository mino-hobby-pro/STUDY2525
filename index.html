<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY2525 - プロフェッショナル動画検索</title>
    <style>
        :root {
            --bg-color: #f9f9f9;
            --text-color: #0f0f0f;
            --text-secondary: #606060;
            --border-color: #e5e5e5;
            --hover-color: #f2f2f2;
            --primary-color: #cc0000;
            --header-bg: #ffffff;
            --search-bg: #ffffff;
            --search-border: #cccccc;
            --comment-bg: #f2f2f2;
            --scrollbar-bg: #e0e0e0;
            font-family: 'Roboto', 'Arial', sans-serif;
        }

        [data-theme="dark"] {
            --bg-color: #0f0f0f;
            --text-color: #f1f1f1;
            --text-secondary: #aaaaaa;
            --border-color: #3f3f3f;
            --hover-color: #272727;
            --header-bg: #0f0f0f;
            --search-bg: #121212;
            --search-border: #303030;
            --comment-bg: #272727;
            --scrollbar-bg: #717171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        a { color: inherit; text-decoration: none; }
        button { cursor: pointer; border: none; background: none; color: inherit; font-family: inherit; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-bg); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        header {
            position: fixed; top: 0; width: 100%; height: 56px; background-color: var(--header-bg);
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
            z-index: 100; border-bottom: 1px solid var(--border-color);
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { display: flex; align-items: center; gap: 4px; font-size: 22px; font-weight: bold; cursor: pointer; letter-spacing: -1px;}
        .logo span { background-color: var(--primary-color); color: white; padding: 2px 8px; border-radius: 8px; font-size: 14px;}
        
        .header-center { flex: 1; max-width: 720px; display: flex; justify-content: center; margin: 0 40px; }
        .search-bar {
            display: flex; width: 100%; max-width: 600px; height: 40px;
            border: 1px solid var(--search-border); border-radius: 20px; overflow: hidden; background-color: var(--search-bg);
        }
        .search-bar input {
            flex: 1; padding: 0 16px 0 24px; border: none; background: transparent; color: var(--text-color); outline: none; font-size: 16px;
        }
        .search-bar button {
            width: 64px; background-color: var(--hover-color); border-left: 1px solid var(--search-border);
            display: flex; align-items: center; justify-content: center;
        }
        
        .header-right { display: flex; align-items: center; gap: 8px; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .icon-btn:hover { background-color: var(--hover-color); }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }

        .sidebar {
            position: fixed; top: 56px; left: 0; bottom: 0; width: 240px; background-color: var(--header-bg);
            padding: 12px 0; z-index: 99; transform: translateX(-100%); transition: transform 0.3s ease;
            border-right: 1px solid var(--border-color);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-item {
            display: flex; align-items: center; gap: 24px; padding: 12px 24px; cursor: pointer; font-size: 14px;
        }
        .sidebar-item:hover, .sidebar-item.active { background-color: var(--hover-color); font-weight: bold; border-radius: 10px; margin: 0 12px; }

        main { margin-top: 56px; padding: 24px; min-height: calc(100vh - 56px); transition: margin-left 0.3s; }
        main.sidebar-open { margin-left: 240px; }
        @media (max-width: 768px) { main.sidebar-open { margin-left: 0; } }

        .view { display: none; }
        .view.active { display: block; }
        .page-header { font-size: 20px; font-weight: bold; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;}

        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; row-gap: 40px;
        }
        .video-card { cursor: pointer; display: flex; flex-direction: column; gap: 12px; transition: transform 0.2s; }
        .video-card:hover { transform: scale(1.02); }
        .thumbnail-container { width: 100%; aspect-ratio: 16 / 9; background-color: var(--hover-color); border-radius: 12px; overflow: hidden; position: relative; }
        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
        .video-info { display: flex; gap: 12px; }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; background-color: var(--hover-color); flex-shrink: 0; overflow: hidden; }
        .video-details { display: flex; flex-direction: column; overflow: hidden; }
        .video-title { font-size: 16px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .video-meta { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

        .watch-layout { display: flex; gap: 24px; max-width: 1500px; margin: 0 auto; flex-wrap: wrap; }
        .watch-main { flex: 1; min-width: 65%; }
        .watch-sidebar { width: 400px; flex-shrink: 0; }
        @media (max-width: 1000px) { .watch-sidebar { width: 100%; } }

        .player-container { width: 100%; aspect-ratio: 16 / 9; background-color: black; border-radius: 12px; overflow: hidden; }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        
        .watch-title { font-size: 20px; font-weight: bold; margin: 12px 0; }
        
        .watch-actions { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;}
        .stream-selector { display: flex; background: var(--hover-color); border-radius: 20px; padding: 4px; }
        .stream-btn { padding: 8px 16px; border-radius: 16px; font-size: 14px; font-weight: 500; }
        .stream-btn.active { background: var(--text-color); color: var(--bg-color); }
        
        .action-buttons { display: flex; gap: 8px; }
        .action-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background-color: var(--hover-color); border-radius: 18px; font-size: 14px; font-weight: 500; }
        .action-btn.active { background-color: var(--text-color); color: var(--bg-color); }

        .comments-header { font-size: 18px; font-weight: bold; margin-bottom: 24px; }
        .comment { display: flex; gap: 16px; margin-bottom: 20px; }
        .comment-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--hover-color);}
        .comment-body { display: flex; flex-direction: column; flex: 1; }
        .comment-header { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 4px; }
        .comment-author { font-weight: 500; background: var(--hover-color); padding: 2px 6px; border-radius: 10px; }
        .comment-text { font-size: 14px; line-height: 1.5; }
        .comment-actions { display: flex; align-items: center; gap: 16px; margin-top: 8px; color: var(--text-secondary); font-size: 12px; }

        .related-video { display: flex; gap: 8px; margin-bottom: 12px; cursor: pointer; padding: 4px; border-radius: 8px;}
        .related-video:hover { background-color: var(--hover-color); }
        .related-thumb { width: 168px; height: 94px; flex-shrink: 0; border-radius: 8px; background: var(--hover-color); overflow: hidden;}
        .related-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .related-info { flex: 1;}
        .related-title { font-size: 14px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px;}
        .related-meta { font-size: 12px; color: var(--text-secondary); }

        .loader { text-align: center; padding: 40px; color: var(--text-secondary); font-weight: bold; width: 100%; }
        .hidden { display: none !important; }

        /* ロボット確認用オーバーレイ（通常は非表示） */
        #hidden-cse-container { 
            display: none; 
            background: white; 
            padding: 20px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="hidden-cse-container"></div>

    <header>
        <div class="header-left">
            <button class="icon-btn" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24"><path d="M21,6H3V5h18V6z M21,11H3v1h18V11z M21,17H3v1h18V17z"></path></svg>
            </button>
            <div class="logo" onclick="navigate('home')">
                <span>2525</span> STUDY
            </div>
        </div>
        <div class="header-center">
            <form class="search-bar" onsubmit="handleSearch(event)">
                <input type="text" id="search-input" placeholder="検索" autocomplete="off">
                <button type="submit">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M20.87,20.17l-5.59-5.59C16.35,13.35,17,11.75,17,10c0-3.87-3.13-7-7-7s-7,3.13-7,7s3.13,7,7,7c1.75,0,3.35-0.65,4.58-1.71 l5.59,5.59L20.87,20.17z M10,16c-3.31,0-6-2.69-6-6s2.69-6,6-6s6,2.69,6,6S13.31,16,10,16z"></path></svg>
                </button>
            </form>
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="toggleTheme()">
                <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"></path></svg>
            </button>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-item" id="nav-home" onclick="navigate('home')">ホーム</div>
        <div class="sidebar-item" id="nav-history" onclick="navigate('history')">履歴</div>
        <div class="sidebar-item" id="nav-favorites" onclick="navigate('favorites')">お気に入り</div>
    </div>

    <main id="main-content">
        <div id="view-home" class="view active">
            <h2 class="page-header">トレンド・いま話題</h2>
            <div id="home-grid" class="video-grid"></div>
            <div id="home-loader" class="loader">動画を読み込み中...</div>
        </div>

        <div id="view-search" class="view">
            <h2 class="page-header" id="search-title">検索結果</h2>
            <div id="search-grid" class="video-grid"></div>
            <div id="search-loader" class="loader hidden">さらに読み込み中...</div>
        </div>

        <div id="view-watch" class="view">
            <div class="watch-layout">
                <div class="watch-main">
                    <div class="player-container">
                        <iframe id="yt-player" allow="autoplay; fullscreen" allowfullscreen></iframe>
                    </div>
                    <h1 class="watch-title" id="watch-title-text">タイトル</h1>
                    <div class="watch-actions">
                        <div class="stream-selector">
                            <button class="stream-btn active" id="btn-stream-1" onclick="switchStream(1)">Nocookie</button>
                            <button class="stream-btn" id="btn-stream-2" onclick="switchStream(2)">Edu (Premium)</button>
                        </div>
                        <button class="action-btn" id="btn-favorite" onclick="toggleFavorite()">保存</button>
                    </div>
                    <div class="comments-section">
                        <div class="comments-header"><span id="comment-count">0</span> 件のコメント</div>
                        <div id="comments-container"></div>
                    </div>
                </div>
                <div class="watch-sidebar">
                    <div style="font-weight:bold; margin-bottom:16px;">次の動画</div>
                    <div id="related-videos"></div>
                    <div id="related-loader" class="loader hidden">関連動画を読み込み中...</div>
                </div>
            </div>
        </div>

        <div id="view-history" class="view">
            <h2 class="page-header">履歴</h2>
            <div id="history-grid" class="video-grid"></div>
        </div>

        <div id="view-favorites" class="view">
            <h2 class="page-header">お気に入り</h2>
            <div id="favorites-grid" class="video-grid"></div>
        </div>
    </main>

    <script>
        let currentView = 'home';
        let currentVideoId = null;
        let currentVideoTitle = '';
        let searchContext = 'trend'; 
        let isFetching = false;
        let lastQuery = '';
        let captchaTimer = null;
        
        const seenVideoIds = new Set();
        
        const KAHOOT_KEY_URL = 'https://apis.kahoot.it/media-api/youtube/key';
        const CORS_PROXIES = [
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://api.codetabs.com/v1/tmp/?quest='
        ];

        initTheme();

        async function fetchKahootKey() {
            try {
                const res = await fetch(KAHOOT_KEY_URL);
                if (res.ok) {
                    const data = await res.json();
                    return data.key || data.enc || data;
                }
            } catch(e) {}
            for (const proxy of CORS_PROXIES) {
                try {
                    const res = await fetch(proxy + encodeURIComponent(KAHOOT_KEY_URL));
                    if (res.ok) {
                        const data = await res.json();
                        return data.key || data.enc || data;
                    }
                } catch(e) {}
            }
            return null;
        }

        function buildEduUrl(videoId, enc) {
            const embedConfig = encodeURIComponent(JSON.stringify({ enc: enc, hideTitle: true }));
            const params = {
                autoplay: '1', mute: '0', controls: '1', start: '0',
                origin: encodeURIComponent('https://create.kahoot.it'),
                playsinline: '1', showinfo: '0', rel: '0', iv_load_policy: '3',
                modestbranding: '1', fs: '1', cc_load_policy: '0', enablejsapi: '1',
                widgetid: '1',
                forigin: encodeURIComponent('https://create.kahoot.it/learner/cb8cb5ae-d835-4c4a-bc2d-9cc78519d646/course/6fba06e3-1f76-47a8-9a4a-53c53eb86286/0'),
                aoriginsup: '1', vf: '6'
            };
            const qs = Object.keys(params).map(k => `${k}=${params[k]}`).join('&');
            return `https://www.youtubeeducation.com/embed/${videoId}?${qs}&embed_config=${embedConfig}`;
        }

        window.__gcse = {
            parsetags: 'explicit',
            initializationCallback: function() {
                google.search.cse.element.render({
                    div: "hidden-cse-container",
                    tag: 'searchresults-only',
                    gname: 'studyCse'
                });
                loadTrend(); 
            },
            searchCallbacks: {
                web: {
                    ready: function(name, q, promos, results) {
                        isFetching = false;
                        clearTimeout(captchaTimer);
                        const cseContainer = document.getElementById('hidden-cse-container');
                        cseContainer.style.display = 'none';

                        let videos = [];
                        if (results && results.length > 0) {
                            results.forEach(r => {
                                const id = extractId(r.unescapedUrl || r.url || (r.richSnippet?.metatags?.['og:video:tag']) || "");
                                if (id && id.length === 11 && !seenVideoIds.has(id)) {
                                    seenVideoIds.add(id);
                                    videos.push({ id: id, title: r.titleNoFormatting || r.title });
                                }
                            });
                        }
                        renderResults(videos);
                        return true; 
                    }
                }
            }
        };

        function extractId(str) {
            const match = str.match(/(?:v=|vi\/|youtu\.be\/|embed\/|v%3D|video\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }

        function triggerSearch(query, context, append = false) {
            if (isFetching) return;
            isFetching = true;
            searchContext = context;
            lastQuery = query;
            if (!append) seenVideoIds.clear();

            clearTimeout(captchaTimer);
            captchaTimer = setTimeout(() => {
                if (isFetching) {
                    const cseContainer = document.getElementById('hidden-cse-container');
                    cseContainer.style.display = 'block';
                    cseContainer.style.position = 'fixed';
                    cseContainer.style.top = '100px';
                    cseContainer.style.left = '50%';
                    cseContainer.style.transform = 'translateX(-50%)';
                    cseContainer.style.zIndex = '10000';
                    alert("ロボット確認が必要です。画面に表示される指示に従ってください。完了すると自動でSTUDY2525に戻ります。");
                }
            }, 3000);

            const element = google.search.cse.element.getElement('studyCse');
            const decor = append ? ["", " pv", " official", " hd", " trailer", " video"][Math.floor(Math.random()*6)] : "";
            element.execute(query + decor + " site:youtube.com");
        }

        function renderResults(videos) {
            if (searchContext === 'related') {
                renderRelatedVideos(videos, true);
                return;
            }
            
            let containerId = (searchContext === 'trend') ? 'home-grid' : 'search-grid';
            const container = document.getElementById(containerId);
            
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(v.id, v.title);
                card.innerHTML = `
                    <div class="thumbnail-container"><img src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"></div>
                    <div class="video-info">
                        <div class="channel-avatar"><img src="https://i.ytimg.com/vi/${v.id}/default.jpg"></div>
                        <div class="video-details">
                            <div class="video-title">${v.title}</div>
                            <div class="video-meta">STUDY2525 • 公開中</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('home-loader').classList.add('hidden');
            document.getElementById('search-loader').classList.add('hidden');
        }

        window.addEventListener('scroll', () => {
            const scrollPos = window.innerHeight + window.scrollY;
            const bodyHeight = document.body.offsetHeight;
            
            if (scrollPos >= bodyHeight - 1000 && !isFetching) {
                if (currentView === 'home') {
                    document.getElementById('home-loader').classList.remove('hidden');
                    triggerSearch(lastQuery || "人気急上昇", 'trend', true);
                } else if (currentView === 'search') {
                    document.getElementById('search-loader').classList.remove('hidden');
                    triggerSearch(lastQuery, 'search', true);
                } else if (currentView === 'watch') {
                    document.getElementById('related-loader').classList.remove('hidden');
                    const cleanTitle = currentVideoTitle.replace(/[【】「」\[\]]/g, ' ').substring(0, 20);
                    triggerSearch(cleanTitle, 'related', true);
                }
            }
        });

        function loadTrend() {
            triggerSearch("人気急上昇 日本 音楽 ゲーム", 'trend');
        }

        function handleSearch(e) {
            e.preventDefault();
            const q = document.getElementById('search-input').value;
            if(!q) return;
            document.getElementById('search-grid').innerHTML = '';
            document.getElementById('search-title').innerText = `「${q}」の検索結果`;
            navigate('search');
            triggerSearch(q, 'search');
        }

        async function playVideo(id, title) {
            currentVideoId = id;
            currentVideoTitle = title;
            navigate('watch');
            document.getElementById('watch-title-text').innerText = title;
            document.getElementById('related-videos').innerHTML = '';
            switchStream(1);
            saveToLocal('history', {id, title});
            updateFavoriteUI();
            
            const cleanTitle = title.replace(/[【】「」\[\]]/g, ' ').substring(0, 20);
            triggerSearch(cleanTitle, 'related');
            fetchComments(id);
        }

        async function switchStream(type) {
            const player = document.getElementById('yt-player');
            document.getElementById('btn-stream-1').classList.toggle('active', type === 1);
            document.getElementById('btn-stream-2').classList.toggle('active', type === 2);
            
            if(type === 1) {
                player.src = `https://www.youtube-nocookie.com/embed/${currentVideoId}?autoplay=1&rel=0`;
            } else {
                player.src = '';
                const key = await fetchKahootKey();
                if (key) player.src = buildEduUrl(currentVideoId, key);
                else {
                    alert("Eduストリームの準備中です。しばらくしてからもう一度お試しください。");
                    switchStream(1);
                }
            }
        }

        function renderRelatedVideos(videos, append = false) {
            const container = document.getElementById('related-videos');
            const html = videos.map(v => `
                <div class="related-video" onclick="playVideo('${v.id}', '${v.title.replace(/'/g, "\\'")}')">
                    <div class="related-thumb"><img src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"></div>
                    <div class="related-info">
                        <div class="related-title">${v.title}</div>
                        <div class="related-meta">関連コンテンツ</div>
                    </div>
                </div>
            `).join('');
            
            if (append) container.insertAdjacentHTML('beforeend', html);
            else container.innerHTML = html;
            
            document.getElementById('related-loader').classList.add('hidden');
        }

        function navigate(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            currentView = viewName;
            if (viewName !== 'watch') {
                document.getElementById('yt-player').src = '';
                seenVideoIds.clear(); 
            }
            if (viewName === 'history') renderLocalList('history');
            if (viewName === 'favorites') renderLocalList('favorites');
            window.scrollTo(0, 0);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('main-content').classList.toggle('sidebar-open');
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('study2525_theme', isDark ? 'light' : 'dark');
        }

        function initTheme() {
            if (localStorage.getItem('study2525_theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
        }

        function saveToLocal(key, video) {
            let list = JSON.parse(localStorage.getItem(key) || '[]');
            list = list.filter(v => v.id !== video.id);
            list.unshift(video);
            localStorage.setItem(key, JSON.stringify(list.slice(0, 50)));
        }

        function toggleFavorite() {
            let list = JSON.parse(localStorage.getItem('favorites') || '[]');
            if (list.some(v => v.id === currentVideoId)) {
                list = list.filter(v => v.id !== currentVideoId);
            } else {
                list.unshift({id: currentVideoId, title: currentVideoTitle});
            }
            localStorage.setItem('favorites', JSON.stringify(list));
            updateFavoriteUI();
        }

        function updateFavoriteUI() {
            const list = JSON.parse(localStorage.getItem('favorites') || '[]');
            const isFav = list.some(v => v.id === currentVideoId);
            const btn = document.getElementById('btn-favorite');
            if(btn) {
                btn.classList.toggle('active', isFav);
                btn.innerText = isFav ? '保存済み' : '保存';
            }
        }

        function renderLocalList(type) {
            const list = JSON.parse(localStorage.getItem(type) || '[]');
            const grid = document.getElementById(`${type}-grid`);
            grid.innerHTML = list.map(v => `
                <div class="video-card" onclick="playVideo('${v.id}', '${v.title.replace(/'/g, "\\'")}')">
                    <div class="thumbnail-container"><img src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"></div>
                    <div class="video-details" style="padding:10px;">
                        <div class="video-title">${v.title}</div>
                    </div>
                </div>
            `).join('');
        }

        async function fetchComments(videoId) {
            const container = document.getElementById('comments-container');
            container.innerHTML = '<div class="loader">読み込み中...</div>';
            try {
                const res = await fetch(`https://min-tube-api-3.vercel.app/api/comments/${videoId}`);
                const data = await res.json();
                document.getElementById('comment-count').innerText = data.comments ? data.comments.length : 0;
                container.innerHTML = data.comments.slice(0, 15).map(c => `
                    <div class="comment">
                        <img class="comment-avatar" src="${c.authorThumbnails ? c.authorThumbnails[0].url : ''}">
                        <div class="comment-body">
                            <div class="comment-header"><span class="comment-author">${c.author}</span></div>
                            <div class="comment-text">${c.content}</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { container.innerHTML = 'コメントを読み込めませんでした。'; }
        }
    </script>
